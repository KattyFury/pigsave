<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PigSave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Barlow:wght@500;700&family=Roboto+Condensed:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="images/0.png" />
  <link rel="apple-touch-icon" href="images/0.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">

  <!-- ══ SCREEN 1 · Connect ═══════════════════════════════ -->
  <!-- 5×11 grid: A-E cols, 1-11 rows -->
  <div id="connectSection" class="screen screen-connect">
    <div class="lang-selector" id="langSelector">
      <button class="lang-pill" onclick="toggleLangMenu()">EN</button>
      <div class="lang-dropdown">
        <button class="lang-option active" onclick="pickLang('en')">EN</button>
        <button class="lang-option"        onclick="pickLang('vi')">VI</button>
        <button class="lang-option"        onclick="pickLang('zh')">CN</button>
      </div>
    </div>

    <!-- 2B-2D: app title -->
    <h1 class="c-title">PigSave</h1>

    <!-- 3B-5D: pig -->
    <div class="c-pig">
      <img src="images/a1.png" class="pig-static" alt="pig" />
    </div>

    <!-- 6B-6D: subtitle -->
    <p class="c-sub"
       data-vi="Kết nối ví để bắt đầu bỏ heo"
       data-en="Connect your wallet to start saving"
       data-zh="连接钱包开始存钱">Connect your wallet to start saving</p>

    <!-- row 10, B-D: connect button -->
    <button class="c-btn" onclick="connectWallet()">
      <span data-vi="KẾT NỐI VÍ" data-en="CONNECT WALLET" data-zh="连接钱包">CONNECT WALLET</span>
    </button>
  </div>

  <!-- ══ SCREEN 2 · Buy Pig ════════════════════════════════ -->
  <!-- Same 5×11 grid as connect screen -->
  <div id="buySection" class="screen screen-buy hidden">

    <!-- 1E: lang pill -->
    <div class="lang-selector">
      <button class="lang-pill" onclick="toggleLangMenu()">EN</button>
      <div class="lang-dropdown">
        <button class="lang-option active" onclick="pickLang('en')">EN</button>
        <button class="lang-option"        onclick="pickLang('vi')">VI</button>
        <button class="lang-option"        onclick="pickLang('zh')">CN</button>
      </div>
    </div>

    <!-- 2B-2D: title (same position as connect) -->
    <h1 class="c-title">PigSave</h1>

    <!-- 3B-5D: pig (same position as connect) -->
    <div class="c-pig">
      <img src="images/a1.png" class="pig-static" alt="pig" />
    </div>

    <!-- 6B-6D: rank badge -->
    <div class="b-rank">PIGLET</div>

    <!-- 7B-9D: Normal / With Goal toggle + desc + goal input -->
    <div class="b-mode">
      <div class="b-mode-btns">
        <button id="selectNormal"  class="b-mode-btn active" onclick="selectMode('normal')">
          <span data-vi="Bình thường" data-en="Normal" data-zh="普通">Normal</span>
        </button>
        <button id="selectPurpose" class="b-mode-btn"        onclick="selectMode('purpose')">
          <span data-vi="Có mục tiêu" data-en="With Goal" data-zh="目标">With Goal</span>
        </button>
      </div>
      <p id="modeDesc" class="b-mode-desc"
         data-vi="Bỏ heo ít nhất 30 lần → lấy lại 1 USDC"
         data-en="Save at least 30 times → get your 1 USDC back"
         data-zh="至少存30次 → 退回1 USDC">Save at least 30 times → get your 1 USDC back</p>
      <div id="goalInputWrap" class="hidden">
        <input id="goalInput" type="number" min="1" step="1"
               placeholder="Goal amount (USDC)" class="goal-input" />
      </div>
    </div>

    <!-- row 10 B-D: buy button -->
    <button class="c-btn" onclick="buyPigAction()">
      <span data-vi="MUA HEO – 1 USDC" data-en="BUY PIG – 1 USDC" data-zh="购买小猪 – 1 USDC">BUY PIG – 1 USDC</span>
    </button>

    <!-- row 11: wallet address + disconnect -->
    <div class="b-wallet">
      <p class="wallet-label" id="buyWalletAddr"></p>
      <button class="btn-disconnect" onclick="disconnectWallet()"
              data-vi="Ngắt kết nối" data-en="Disconnect" data-zh="断开连接">Disconnect</button>
    </div>
  </div>

  <!-- ══ SCREEN 3 · Main App ═══════════════════════════════ -->
  <!-- 5×11 grid: same system as connect / buy screens -->
  <div id="appSection" class="screen screen-app hidden">

    <!-- 1E: lang pill -->
    <div class="lang-selector">
      <button class="lang-pill" onclick="toggleLangMenu()">EN</button>
      <div class="lang-dropdown">
        <button class="lang-option active" onclick="pickLang('en')">EN</button>
        <button class="lang-option"        onclick="pickLang('vi')">VI</button>
        <button class="lang-option"        onclick="pickLang('zh')">CN</button>
      </div>
    </div>

    <!-- 2B-2D: deposit count — large orange number, small labels each side -->
    <div class="a-stats">
      <span class="stat-unit" data-vi="Đã bỏ" data-en="Saved" data-zh="已存">Saved</span>
      <span class="stat-big" id="depositCount">0</span>
      <span class="stat-unit" data-vi="lần" data-en="times" data-zh="次">times</span>
    </div>

    <!-- 3B-5D: pig — z-index 60 so it shows above the modal dim overlay -->
    <div class="a-pig">
      <div class="pig-scale" id="pigScale">
        <img id="pigImg" src="images/a1.png" class="pig" alt="pig" />
      </div>
    </div>

    <!-- 6B-6D: rank badge -->
    <div id="rankBadge" class="a-rank rank-piglet">Piglet</div>

    <!-- 7B-7D: normal-mode 30-save progress bar (hidden once 30 reached) -->
    <div id="normalProgress" class="a-progress">
      <div class="progress-track">
        <div id="progressFill" class="progress-fill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progressLabel">0 / 30</span>
    </div>

    <!-- 7B-7D: purpose-mode goal progress bar -->
    <div id="purposeProgress" class="a-progress hidden">
      <div class="progress-track">
        <div id="goalFill" class="progress-fill goal-fill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="goalPct">0%</span>
    </div>

    <!-- 9B-9D: deposit buttons -->
    <div class="a-deposit-row">
      <button class="btn-deposit" onclick="deposit(1)">+1 USDC</button>
      <button class="btn-deposit" onclick="deposit(10)">+10 USDC</button>
      <button class="btn-deposit" onclick="deposit(100)">+100 USDC</button>
    </div>

    <!-- 10B-10D: break button -->
    <button class="btn-break a-break" onclick="tryWithdraw()">
      <span data-vi="Đập heo" data-en="Break Piggy Bank" data-zh="打碎存钱罐">Break Piggy Bank</span>
    </button>

    <!-- 11B-11D: wallet + disconnect -->
    <div class="a-wallet">
      <p class="wallet-label" id="walletAddr"></p>
      <button class="btn-disconnect" onclick="disconnectWallet()"
              data-vi="Ngắt kết nối" data-en="Disconnect" data-zh="断开连接">Disconnect</button>
    </div>

  </div>
</div><!-- /container -->

<!-- Modal — early-break warning OR 30/30 success
     .success class added for success state (Break It turns orange).
     Pig stays visible above overlay (a-pig z-index: 60).
     modal-box anchored so buttons land near row 9. -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 id="modalTitle"></h2>
    <p  id="modalBody"  class="modal-body"></p>
    <p  id="modalCount" class="modal-count"></p>
    <div class="modal-actions">
      <button class="btn-keep" onclick="closeModal()">
        <span data-vi="Tiếp tục kiên trì" data-en="Keep Saving" data-zh="继续存钱">Keep Saving</span>
      </button>
      <button class="btn-break-modal" id="modalBreakBtn" onclick="confirmWithdraw()">
        <span data-vi="Đập luôn" data-en="Break It" data-zh="打碎">Break It</span>
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
